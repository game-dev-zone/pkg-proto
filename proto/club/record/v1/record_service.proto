syntax = "proto3";

package club.record.v1;

import "club/common/v1/common.proto";
import "club/game/v1/game_service.proto";

// ---------------------------------------------------------------------------
// Entities
// ---------------------------------------------------------------------------

// GameRecord 一場對局的審計快照。
//
// 原則：
//   - 一場對局 (room_id) 若含多局，以 round_id 區分；單局遊戲 round_id 留空。
//   - idempotency_key 必填，UNIQUE；多數情況為 "<game_id>-settle-<room_id>"
//     或 "<game_id>-settle-<room_id>-<round_id>"，與 Tx 的結算 key 對齊。
//   - payouts 是權威結算結果；game_detail 為各遊戲自訂序列化（牌型、命中線等）。
message GameRecord {
  string record_id = 1;        // UUID，主鍵
  string game_id = 2;          // "ddz" / "niuniu" / ...
  string room_id = 3;
  string round_id = 4;         // 多局類遊戲的第 N 局；單局遊戲留空
  int64 started_at = 5;        // unix seconds
  int64 settled_at = 6;
  int64 total_pot = 7;         // 本局總注
  repeated club.game.v1.Payout payouts = 8;
  bytes game_detail = 9;       // 各遊戲自訂 snapshot (牌型/賠率表/命中線 …)
  string idempotency_key = 10; // UNIQUE；重送回傳原結果
  string trace_id = 11;
}

// ---------------------------------------------------------------------------
// Requests / Responses
// ---------------------------------------------------------------------------

message WriteGameRecordRequest {
  GameRecord record = 1;
}

message WriteGameRecordResponse {
  club.common.v1.Ack ack = 1;
  string record_id = 2;
}

// QueryGameRecordsRequest 支援按 user / game / room 過濾與 cursor 分頁。
message QueryGameRecordsRequest {
  string user_id = 1;     // 可選：只回傳 user 在 payouts 中出現的場次
  string game_id = 2;     // 可選：按遊戲過濾
  string room_id = 3;     // 可選：按房間過濾
  int64 since = 4;        // unix seconds，settled_at 下界（含）
  int64 until = 5;        // unix seconds，settled_at 上界（不含）
  int32 limit = 6;        // default 50, max 500
  string cursor = 7;      // 由上一頁 response.next_cursor 帶入
}

message QueryGameRecordsResponse {
  club.common.v1.Ack ack = 1;
  repeated GameRecord records = 2;
  string next_cursor = 3; // 空字串代表沒有下一頁
}

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

service RecordService {
  // WriteGameRecord 冪等寫入一場結算紀錄。由 pkg-game-framework 於 Settle 成功後
  // 以 2 秒超時背景呼叫；失敗時記 ERROR log 與 metric，但結算本身仍回成功。
  rpc WriteGameRecord(WriteGameRecordRequest) returns (WriteGameRecordResponse);

  // QueryGameRecords 依 user/game/room 過濾並 cursor 分頁查詢歷史紀錄。
  rpc QueryGameRecords(QueryGameRecordsRequest) returns (QueryGameRecordsResponse);
}
